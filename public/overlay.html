<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="overlay">

  <!-- TIMER -->
  <div id="timer">00:00</div>

  <!-- MAIN BLOCK -->
  <div class="main">

    <!-- LEFT -->
    <div class="team" id="leftBox">
      <div class="name" id="leftName"></div>
      <div class="score" id="leftScore">0</div>
    </div>

    <!-- CENTER -->
    <div class="centerBlock">
      <div class="round">ROUND</div>
      <div id="round">1</div>

      <!-- 🔥 COMPACT GAME BAR -->
      <div class="gameBar">
        <div id="gameText">Aktuelles Game: -</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="team" id="rightBox">
      <div class="name" id="rightName"></div>
      <div class="score" id="rightScore">0</div>
    </div>

  </div>

  <!-- WINNER -->
  <div id="winnerBox" class="winner hidden"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
