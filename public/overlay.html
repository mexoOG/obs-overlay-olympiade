<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="overlay">

<div id="timer">00:00</div>

<div class="main">

  <div class="team" id="leftBox">
    <div class="name" id="leftName"></div>
    <div class="scoreWrap">
      <div class="score" id="leftScore">0</div>
    </div>
  </div>

  <div class="centerBlock">
    <div id="round">1</div>

    <div class="gameBar">
      <div id="gameText">Aktuelles Game</div>
    </div>
  </div>

  <div class="team" id="rightBox">
    <div class="name" id="rightName"></div>
    <div class="scoreWrap">
      <div class="score" id="rightScore">0</div>
    </div>
  </div>

</div>

<div id="winnerBox" class="winner hidden"></div>

<canvas id="confetti"></canvas>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
