<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel">

<h1>⚙ SETTINGS PANEL</h1>

<iframe src="/overlay.html" class="preview"></iframe>

<hr>

<h2>LEFT TEAM</h2>
<input id="leftName" placeholder="Name" oninput="updateNames()">
<label>Name Size</label>
<input type="range" id="leftSize" min="20" max="80" onchange="updateSize()">

<h2>RIGHT TEAM</h2>
<input id="rightName" placeholder="Name" oninput="updateNames()">
<label>Name Size</label>
<input type="range" id="rightSize" min="20" max="80" onchange="updateSize()">

<hr>

<h2>AKTUELLES GAME</h2>
<input id="gameInput" placeholder="z.B. FIFA / Mario Kart">
<button onclick="setGame()">SET</button>

<hr>

<h2>RUNDE</h2>
<button onclick="roundChange(-1)">-</button>
<button onclick="roundChange(1)">+</button>

<hr>

<h2>WIN POINTS</h2>
<input id="winPoints" placeholder="z.B. 5">
<button onclick="setWin()">SET</button>

<hr>

<h2>SCORE</h2>
<input id="scoreAmount" placeholder="z.B. 1 oder -1">

<button onclick="score('left')">Left</button>
<button onclick="score('right')">Right</button>

<hr>

<h2>WINNER</h2>
<button onclick="winner('left')">Winner Left</button>
<button onclick="winner('right')">Winner Right</button>
<button onclick="clearWinner()">Reset Match</button>

<hr>

<!-- 🔥 TIMER FIX -->
<h2>TIMER</h2>
<button onclick="timerStart()">START</button>
<button onclick="timerStop()">STOP</button>
<button onclick="timerReset()">RESET</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
