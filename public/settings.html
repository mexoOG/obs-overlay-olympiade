<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel">
<h1>⚙️ SETTINGS</h1>

<div class="preview">
  <!-- IMPORTANT: uses overlay.html (no /overlay route) -->
  <iframe src="/overlay.html"></iframe>
</div>

<input id="leftName" placeholder="Left Name">
<input id="rightName" placeholder="Right Name">

<br>

<label>Overlay Color</label>
<input type="color" id="color">

<br><br>

<button onclick="score('left',1)">Left +</button>
<button onclick="score('left',-1)">Left -</button>

<button onclick="score('right',1)">Right +</button>
<button onclick="score('right',-1)">Right -</button>

<br>

<button onclick="round(1)">Round +</button>
<button onclick="round(-1)">Round -</button>

<button onclick="reset()">RESET</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
