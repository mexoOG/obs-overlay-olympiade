<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel">

<h1>SETTINGS</h1>

<iframe src="/overlay.html" class="preview"></iframe>

<h2>LEFT</h2>
<input id="leftName">
<input type="range" id="leftSize" min="20" max="80">

<h2>RIGHT</h2>
<input id="rightName">
<input type="range" id="rightSize" min="20" max="80">

<hr>

<h2>GAME</h2>
<input id="gameInput">
<button onclick="setGame()">SET</button>

<hr>

<h2>ROUND</h2>
<button onclick="roundChange(-1)">-</button>
<button onclick="roundChange(1)">+</button>

<hr>

<h2>SCORE</h2>
<input id="scoreAmount" placeholder="z.B. 3">

<button onclick="score('left')">Left</button>
<button onclick="score('right')">Right</button>

<hr>

<h2>WINNER</h2>
<button onclick="winner('left')">Winner Left</button>
<button onclick="winner('right')">Winner Right</button>
<button onclick="clearWinner()">Clear</button>

<hr>

<button onclick="timerStart()">Start</button>
<button onclick="timerStop()">Stop</button>
<button onclick="timerReset()">Reset</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
