<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel">

<h1>⚙ SETTINGS PANEL</h1>

<iframe src="/overlay.html" class="preview"></iframe>

<h2>LEFT (ORANGE)</h2>
<input id="leftName" placeholder="Name">
<label>Name Size</label>
<input type="range" id="leftSize" min="20" max="80">

<h2>RIGHT (BLUE)</h2>
<input id="rightName" placeholder="Name">
<label>Name Size</label>
<input type="range" id="rightSize" min="20" max="80">

<hr>

<h2>SCORE</h2>

<button onclick="score('left',1)">Left +</button>
<button onclick="score('left',-1)">Left -</button>

<button onclick="score('right',1)">Right +</button>
<button onclick="score('right',-1)">Right -</button>

<hr>

<h2>TIMER</h2>
<button onclick="timerStart()">START</button>
<button onclick="timerStop()">STOP</button>
<button onclick="timerReset()">RESET</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
