<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel">

<h1>SETTINGS</h1>

<iframe src="/overlay.html" class="preview"></iframe>

<h3>LEFT TEAM</h3>
<input id="leftName" placeholder="Name">
<input type="color" id="leftColor">
<input type="color" id="leftBorder">
<input type="range" min="20" max="80" id="leftSize">

<h3>RIGHT TEAM</h3>
<input id="rightName" placeholder="Name">
<input type="color" id="rightColor">
<input type="color" id="rightBorder">
<input type="range" min="20" max="80" id="rightSize">

<br><br>

<button onclick="scoreAdd('left',1)">+1 Left</button>
<button onclick="scoreAdd('left',-1)">-1 Left</button>

<button onclick="scoreAdd('right',1)">+1 Right</button>
<button onclick="scoreAdd('right',-1)">-1 Right</button>

<br><br>

<button onclick="timerStart()">START</button>
<button onclick="timerStop()">STOP</button>
<button onclick="timerReset()">RESET</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
