<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel">

<h1>SETTINGS</h1>

<iframe src="/overlay.html" class="preview"></iframe>

<h2>LEFT</h2>
<input id="leftName" oninput="updateNames()">
<input type="range" id="leftSize" min="20" max="80">

<h2>RIGHT</h2>
<input id="rightName" oninput="updateNames()">
<input type="range" id="rightSize" min="20" max="80">

<hr>

<h2>GAME</h2>
<input id="gameInput">
<button onclick="setGame()">SET</button>

<hr>

<h2>WIN POINTS</h2>
<input id="winPoints" placeholder="z.B. 5">
<button onclick="setWin()">SET</button>

<hr>

<h2>SCORE</h2>
<input id="scoreAmount" placeholder="z.B. 1 oder -1">

<button onclick="score('left')">Left</button>
<button onclick="score('right')">Right</button>

<hr>

<button onclick="clearWinner()">RESET MATCH</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
